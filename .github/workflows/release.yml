name: Release

on:
  push:
    branches:
      - main
      - master
      - development

permissions:
  contents: read

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'skip release')"
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x, 26.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'skip release')"
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Get App user identity
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          USER_ID=$(gh api /users/${{ steps.app-token.outputs.app-slug }}[bot] --jq .id)
          echo "user-id=${USER_ID}" >> "$GITHUB_OUTPUT"
          echo "user-name=${{ steps.app-token.outputs.app-slug }}[bot]" >> "$GITHUB_OUTPUT"
          echo "user-email=${USER_ID}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.app-user.outputs.user-name }}
          GIT_AUTHOR_EMAIL: ${{ steps.app-user.outputs.user-email }}
          GIT_COMMITTER_NAME: ${{ steps.app-user.outputs.user-name }}
          GIT_COMMITTER_EMAIL: ${{ steps.app-user.outputs.user-email }}
        run: npx semantic-release

  jsr:
    name: Publish to JSR
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'skip release')"
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get latest version from npm
        id: version
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
            TAG="latest"
          else
            TAG="$BRANCH"
          fi
          VERSION=$(npm view @icazemier/gibbons-mongodb@"$TAG" version 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "No version found on npm for dist-tag '$TAG', skipping JSR publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update deno.json version
        if: steps.version.outputs.skip != 'true'
        env:
          JSR_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const deno = JSON.parse(fs.readFileSync("deno.json", "utf8"));
            deno.version = process.env.JSR_VERSION;
            fs.writeFileSync("deno.json", JSON.stringify(deno, null, 2) + "\n");
          '

      - name: Publish to JSR
        if: steps.version.outputs.skip != 'true'
        run: npx jsr publish --allow-dirty
